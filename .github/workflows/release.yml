name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.0.23)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Invalid version format '$VERSION'. Expected semver (e.g. 0.0.23)"
            exit 1
          fi

      - name: Check version not already tagged
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if git tag -l "v$VERSION" | grep -q .; then
            echo "Error: Tag v$VERSION already exists"
            exit 1
          fi

      - name: Sync versions
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          npm version "$VERSION" --no-git-tag-version --allow-same-version

          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          NPM_VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          [ "$CARGO_VERSION" = "$NPM_VERSION" ] || { echo "Version mismatch!"; exit 1; }

      - name: Generate CHANGELOG
        run: |
          VERSION="${{ github.event.inputs.version }}"
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "")

          {
            echo "## v$VERSION ($(date +%Y-%m-%d))"
            echo ""
            if [ -n "$LAST_TAG" ]; then
              echo "Changes since $LAST_TAG:"
              echo ""
              git log "$LAST_TAG"..HEAD --pretty=format:"- %s (%h)"
            else
              echo "Initial release"
            fi
            echo ""
            echo ""
          } > /tmp/changelog_entry.md

          if [ -f CHANGELOG.md ]; then
            cat /tmp/changelog_entry.md CHANGELOG.md > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md
          else
            cat /tmp/changelog_entry.md > CHANGELOG.md
          fi

      - name: Commit and tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock package.json CHANGELOG.md
          git commit -m "chore(release): v$VERSION"
          git tag "v$VERSION"
          git push origin HEAD:${{ github.ref_name }} --tags

      - name: Output version
        id: version
        run: echo "version=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

  create-release:
    name: Create Release
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: get_version
        run: echo "version=${{ needs.prepare.outputs.version }}" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build - ${{ matrix.platform.name }}
    needs: create-release
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows x64
            os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ziro.exe
            asset: ziro-windows-x86_64.zip
          - name: Linux x64
            os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ziro
            asset: ziro-linux-x86_64.zip
          - name: Linux ARM64
            os: linux
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: ziro
            asset: ziro-linux-aarch64.zip
          - name: macOS ARM64
            os: macos
            runner: macos-latest
            target: aarch64-apple-darwin
            binary: ziro
            asset: ziro-macos-aarch64.zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.platform.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.platform.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.platform.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CC=aarch64-linux-gnu-gcc
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.platform.target }}

      - name: Package and checksum
        shell: bash
        run: |
          mkdir -p pkg
          BINARY="target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary }}"
          [ "${{ matrix.platform.os }}" != "windows" ] && chmod +x "$BINARY"
          cp "$BINARY" "pkg/ziro${{ matrix.platform.os == 'windows' && '.exe' || '' }}"
          cd pkg
          if [ "${{ matrix.platform.os }}" = "windows" ]; then
            7z a "../${{ matrix.platform.asset }}" "ziro.exe"
          else
            zip "../${{ matrix.platform.asset }}" ziro
          fi
          cd ..
          if [ "${{ matrix.platform.os }}" = "windows" ]; then
            certutil -hashfile "${{ matrix.platform.asset }}" SHA256 | grep -v ":" | tr -d ' \r\n' | head -c 64 > hash.txt
            echo "  ${{ matrix.platform.asset }}" >> hash.txt
            mv hash.txt "${{ matrix.platform.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.platform.asset }}" > "${{ matrix.platform.asset }}.sha256"
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: |
            ${{ matrix.platform.asset }}
            ${{ matrix.platform.asset }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: [create-release, build]
    runs-on: ubuntu-latest
    if: ${{ secrets.CARGO_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - run: cargo publish --token ${{ secrets.CARGO_TOKEN }} --allow-dirty

  publish-npm:
    name: Publish to npm
    needs: [create-release, build]
    runs-on: ubuntu-latest
    if: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
