name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.0.23)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate and sync
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Invalid version format '$VERSION'"
            exit 1
          fi
          if git tag -l "v$VERSION" | grep -q .; then
            echo "Error: Tag v$VERSION already exists"
            exit 1
          fi

          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          npm version "$VERSION" --no-git-tag-version --allow-same-version

          CARGO_V=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          NPM_V=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          [ "$CARGO_V" = "$NPM_V" ] || { echo "Version mismatch!"; exit 1; }

      - name: Generate CHANGELOG
        run: |
          VERSION="${{ github.event.inputs.version }}"
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "")
          {
            echo "## v$VERSION ($(date +%Y-%m-%d))"
            echo ""
            if [ -n "$LAST_TAG" ]; then
              echo "Changes since $LAST_TAG:"
              echo ""
              git log "$LAST_TAG"..HEAD --pretty=format:"- %s (%h)"
            else
              echo "Initial release"
            fi
            echo ""
            echo ""
          } > /tmp/changelog_entry.md
          if [ -f CHANGELOG.md ]; then
            cat /tmp/changelog_entry.md CHANGELOG.md > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md
          else
            cp /tmp/changelog_entry.md CHANGELOG.md
          fi

      - name: Commit and tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock package.json CHANGELOG.md
          git commit -m "chore(release): v$VERSION"
          git tag "v$VERSION"
          git push origin HEAD:${{ github.ref_name }} --tags

      - name: Output version
        id: version
        run: echo "version=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

  create-release:
    name: Create Release
    needs: [prepare]
    if: always() && needs.prepare.result != 'failure'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build - ${{ matrix.platform.name }}
    needs: create-release
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows x64
            os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ziro.exe
            asset: windows-x64.zip
          - name: Linux x64
            os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ziro
            asset: linux-x64.zip
          - name: Linux ARM64
            os: linux
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: ziro
            asset: linux-aarch64.zip
          - name: macOS ARM64
            os: macos
            runner: macos-latest
            target: aarch64-apple-darwin
            binary: ziro
            asset: macos-aarch64.zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.platform.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.platform.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.platform.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CC=aarch64-linux-gnu-gcc
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.platform.target }}

      - name: Package and checksum
        shell: bash
        run: |
          mkdir -p pkg
          BINARY="target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary }}"
          [ "${{ matrix.platform.os }}" != "windows" ] && chmod +x "$BINARY"
          cp "$BINARY" "pkg/ziro${{ matrix.platform.os == 'windows' && '.exe' || '' }}"
          cd pkg
          if [ "${{ matrix.platform.os }}" = "windows" ]; then
            7z a "../${{ matrix.platform.asset }}" "ziro.exe"
          else
            zip "../${{ matrix.platform.asset }}" ziro
          fi
          cd ..
          if [ "${{ matrix.platform.os }}" = "windows" ]; then
            certutil -hashfile "${{ matrix.platform.asset }}" SHA256 | grep -v ":" | tr -d ' \r\n' | head -c 64 > hash.txt
            echo "  ${{ matrix.platform.asset }}" >> hash.txt
            mv hash.txt "${{ matrix.platform.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.platform.asset }}" > "${{ matrix.platform.asset }}.sha256"
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: |
            ${{ matrix.platform.asset }}
            ${{ matrix.platform.asset }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Publish
        run: cargo publish --token ${{ secrets.CARGO_TOKEN }} --allow-dirty
        continue-on-error: true

  publish-npm:
    name: Publish to npm
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish
        run: npm publish
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
